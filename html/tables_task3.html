<!DOCTYPE html>
<html>
<head>
    <title>Table</title>
</head>
<body>

<h2 align="center">Table</h2>

<table border="1" align="center">
    <colgroup>
         <col span="1" bgcolor="lightpink">
            <col span="2" bgcolor="powderblue">
            <col span="1" bgcolor="lightgreen">
    </colgroup>

    <tr bgcolor="red">
        <th rowspan="2">Day</th>
        <th colspan="2">Schedule</th>
        <th rowspan="2">Topic</th>
    </tr>
    <tr bgcolor="red">
        <th>Begin</th>
        <th>End</th>
    </tr>

    <tr>
        <td rowspan="2">Monday</td>
        <td >10:00 AM</td>
        <td bgcolor="ivory">12:00 PM</td>
        <td rowspan="2">Introduction to HTML</td>
    </tr>
    <tr>
        <td>3:00 PM</td>
        <td bgcolor="violet">5:00 PM</td>
    </tr>
    
    <tr>
        <td rowspan="2">Tuesday</td>
        <td bgcolor="violet">8:00 AM</td>
        <td>11:00 AM</td>
        <td>CSS Basics</td>
    </tr>
    <tr>
        <td>2:00 PM</td>
        <td bgcolor="violet">5:00 PM</td>
        <td>JavaScript</td>
    </tr>

    
    <tr>
        <td>Wednesday</td>
        <td>8:00 AM</td>
        <td bgcolor="violet">12:00 PM</td>
        <td>Project Work</td>
    </tr>

</table>

</body>
</html>
