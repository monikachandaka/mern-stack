<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media tags example</title>
  </head>
  <body>
    <h1>Audio Tag example</h1>
    <audio src="./Aaya Sher.mp3" controls loop autoplay muted></audio>

    <h1>Video tag example</h1>
    <video src="./video.mp4" controls autoplay></video>

    <h1>Embed google Map using iframe</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15199.937487216757!2d83.22126379711952!3d17.745375531263466!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a3967e1192dbb47%3A0x9173d2e4451c9d94!2sNad%20Junction%2C%20Shanti%20Nagar%2C%20NSTL%2C%20Visakhapatnam%2C%20Andhra%20Pradesh!5e0!3m2!1sen!2sin!4v1776867577846!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></>"
      width="400"
      height="300"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <h1>Embed Youtube video using Iframe</h1>
    <iframe
      src="https://www.youtube.com/embed/iAtoZar5W58?si=YkdHQrrAO5LS1X82"
      frameborder="0"
    ></iframe>


    <h1>Embed web page using Iframe </h1>
    <iframe src="./job_application.html" frameborder="0" height="1050px" width="500px"></iframe>


    <h1>Embed website using Iframe </h1>
    <iframe src="https://www.programiz.com/python-programming/online-compiler/" frameborder="0"></iframe>


    <h1>Embed PDF file</h1>
    <iframe src="./monika resume.pdf" frameborder="0"></iframe>
  </body>
</html>
