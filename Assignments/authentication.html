<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Authentication</title>
<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
    }

    .container {
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
    }

    button {
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<!-- Registration Page -->
<div class="container" id="registerPage">
    <h2>Register</h2>
    <input type="text" id="regUsername" placeholder="Username"><br>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <input type="text" id="regPhone" placeholder="Phone Number"><br>
    <button onclick="register()">Register</button>
    <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- Login Page -->
<div class="container hidden" id="loginPage">
    <h2>Login</h2>
    <input type="text" id="loginUsername" placeholder="Username"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p>New user? <a href="#" onclick="showRegister()">Register</a></p>
</div>

<!-- Home Page -->
<div class="container hidden" id="homePage">
    <h2 id="welcomeMsg"></h2>
    <button onclick="logout()">Logout</button>
</div>

<script>
function showLogin() {
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

function showRegister() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
}

function register() {
    let username = document.getElementById("regUsername").value;
    let email = document.getElementById("regEmail").value;
    let password = document.getElementById("regPassword").value;
    let phone = document.getElementById("regPhone").value;

    if (username === "" || email === "" || password === "" || phone === "") {
        alert("All fields are required");
        return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("password", password);

    alert("Registration Successful");
    showLogin();
}

function login() {
    let username = document.getElementById("loginUsername").value;
    let password = document.getElementById("loginPassword").value;

    let storedUser = localStorage.getItem("username");
    let storedPass = localStorage.getItem("password");

    if (username === storedUser && password === storedPass) {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("homePage").classList.remove("hidden");
        document.getElementById("welcomeMsg").innerText = "Welcome, " + username;
    } else {
        alert("Invalid Username or Password");
    }
}

function logout() {
    alert("Logged out successfully");
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}
</script>

</body>
</html>
