<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav {
            background-image: linear-gradient(transparent, plum);
        }

        ol {
            display: flex;
            padding: 20px;
            justify-content: space-evenly;
            list-style-type: none;
        }

        li {
            background-color: black;
            color: aliceblue;
            padding: 10px 20px;
        }

        /* small devices designing */
        @media screen and (max-width:450px) {
            ol {
                flex-direction: column;

            }

            li {
                margin: 10px;
                text-align: center;
            }
        }
        /* ipads */
        @media screen and (min-width:450px) and (max-width:850px){
            nav{
                background-image: linear-gradient(goldenrod,plum);
            }
            li{
                background-color: blanchedalmond;
                color: blueviolet;
            }
        }
    </style>
</head>

<body>
    <nav>

        <ol>
            <li>Home</li>
            <li>About</li>
            <li>Help</li>
            <li>Contact</li>
            <li>Login</li>
        </ol>
    </nav>

</body>

</html>
